version: "3.9"

# ============================================================
# JobGrade SaaS — Local Development Stack
# EMA — Engineering Manager Agent | Sprint 1
# ============================================================
# Usage:
#   docker compose up -d
#   docker compose down -v   (sterge si volumele)

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobgrade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobgrade_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobgrade_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Keycloak 24 ────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: jobgrade_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev_pass
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/keycloak-realm-jobgrade.json:/opt/keycloak/data/import/realm.json:ro
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      # Imaginea quay.io/keycloak/keycloak NU are curl/wget/nc. Folosim bash /dev/tcp
      # care e built-in (bash există în UBI). Verifică că portul 8080 răspunde HTTP 200.
      test: ["CMD-SHELL", "timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /realms/master/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q \"200 OK\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # Quarkus dev build + import realm ≈ 2-3 min

  # ── n8n (Workflow Automation) ──────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: jobgrade_n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_dev
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: postgres_dev_pass
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: n8n_dev_pass
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: Europe/Bucharest
      TZ: Europe/Bucharest
      N8N_CUSTOM_EXTENSIONS: ""
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      WEBHOOK_URL: http://localhost:5678/
      # Variabile pentru webhook-uri catre API intern
      JOBGRADE_API_URL: http://host.docker.internal:3000
      APP_URL: http://host.docker.internal:3000
      # Cheie unica: toate workflow-urile folosesc $env.INTERNAL_API_KEY cu header x-internal-key
      INTERNAL_API_KEY: "94486c2998cdccae76cbce90168ff8d0072c97b42e7bf407b4445e03adfad688"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows-import:ro
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── ntfy (Push Notifications → Owner) ────────────────────
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: jobgrade_ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: http://localhost:8090
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: read-write
      NTFY_BEHIND_PROXY: "false"
      NTFY_ATTACHMENT_CACHE_DIR: /var/lib/ntfy/attachments
    ports:
      - "8090:80"
    volumes:
      - ntfy_data:/var/lib/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LocalStack (AWS KMS mock) ───────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: jobgrade_localstack
    environment:
      SERVICES: kms,s3,secretsmanager
      DEBUG: "0"
      AWS_DEFAULT_REGION: eu-central-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep running"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── JobGrade App (Next.js) ──────────────────────────────
  jobgrade-app:
    build:
      context: ./jobgrade-app
      dockerfile: Dockerfile.dev
    container_name: jobgrade_app
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./jobgrade-app:/app
      - /app/node_modules
      - /app/.next
    environment:
      PORT: 3001
      NODE_ENV: development
    env_file:
      - ./jobgrade-app/.env
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Remediation Runner ─────────────────────────────────────
  # Sidecar cu scop unic: docker restart pe containere allowlist.
  # Singurul container din stack care are acces la docker socket.
  # Principiu 05.04.2026: funcțional, zero semantic.
  remediation-runner:
    build:
      context: ./remediation-runner
      dockerfile: Dockerfile
    container_name: jobgrade_remediation_runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"  # bind DOAR pe localhost, nu expus în rețea
    environment:
      PORT: 8080
    env_file:
      - ./jobgrade-app/.env  # pentru INTERNAL_API_KEY
    volumes:
      # Docker socket read-write — NECESAR pentru `docker restart`
      # Allowlist-ul hardcoded din server.py limitează daunele potențiale
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      # 127.0.0.1 explicit: busybox wget rezolvă localhost la ::1 (IPv6), dar
      # serverul Python ascultă doar pe IPv4 0.0.0.0.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  localstack_data:
  n8n_data:
  ntfy_data:
