name: Organism Vital Signs — Diagnostic zilnic

on:
  schedule:
    # Zilnic la 07:00 UTC (10:00 EET), L-V
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # permite rulare manuala

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vital-signs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run vital signs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          JOBGRADE_API_URL: https://jobgrade.ro
        run: npx tsx scripts/test-living-organism.ts || true

      - name: Save to DB
        if: always()
        run: |
          JSON_FILE=$(ls docs/vital-signs/vital-signs-*.json 2>/dev/null | tail -1)
          if [ -f "$JSON_FILE" ]; then
            curl -sf -m 30 -X POST \
              "https://jobgrade.ro/api/v1/vital-signs" \
              -H "Content-Type: application/json" \
              -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" \
              -d @"$JSON_FILE" || echo "save to DB failed"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vital-signs-${{ github.run_id }}
          path: docs/vital-signs/
          retention-days: 30
