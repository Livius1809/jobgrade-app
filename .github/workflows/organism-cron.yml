name: Organism Pulse — Cron Principal

on:
  schedule:
    # La fiecare 2 ore, L-V 06-20 UTC (08-22 EET)
    - cron: '0 6,8,10,12,14,16,18,20 * * 1-5'
  workflow_dispatch: # permite rulare manuala

jobs:
  organism-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Detect dysfunctions (monitor role-activity)
        run: |
          curl -sf -m 60 \
            "https://jobgrade.ro/api/v1/monitors/role-activity" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" || echo "monitor skipped"

      - name: Process signals (cron/signals)
        run: |
          curl -sf -m 60 \
            "https://jobgrade.ro/api/cron/signals" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" || echo "signals skipped"

      - name: Cleanup old signals
        run: |
          curl -sf -m 30 -X POST \
            "https://jobgrade.ro/api/v1/signals/cleanup" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" || echo "cleanup skipped"

      - name: Execute tasks (cron/executor)
        run: |
          curl -sf -m 120 \
            "https://jobgrade.ro/api/cron/executor" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" || echo "executor skipped"

      - name: Retry failed tasks (cron/retry)
        run: |
          curl -sf -m 120 \
            "https://jobgrade.ro/api/cron/retry" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" || echo "retry skipped"

      - name: Evolution cycle (consciousness)
        run: |
          curl -sf -m 120 -X POST \
            "https://jobgrade.ro/api/v1/evolution" \
            -H "Content-Type: application/json" \
            -H "x-internal-key: ${{ secrets.INTERNAL_API_KEY }}" \
            -d '{"context":"INTERNAL","subjectId":"system"}' || echo "evolution skipped"
